<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Crawler Graph</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: #e0e0e0;
            --line-color: #aab;
            --highlight-color: #ffd700;
            --primary-color: #4f46e5;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --node-width: 220px;
            --node-height: 80px;
            --level-height: 180px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header & Controls --- */
        header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-val {
            font-size: 1.1rem;
            font-weight: 700;
            color: #818cf8;
        }

        .stat-lbl {
            font-size: 0.75rem;
            color: #9ca3af;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }

        button.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .search-container {
            position: relative;
        }

        .search-container input {
            padding: 8px 12px 8px 35px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 0.9rem;
            outline: none;
            width: 200px;
            transition: width 0.3s;
        }

        .search-container input:focus {
            width: 280px;
            border-color: var(--primary-color);
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
            pointer-events: none;
        }

        /* --- Visualization Area --- */
        #viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: grab;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #viewport:active {
            cursor: grabbing;
        }

        #world {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
            /* Transition is handled via JS for performance */
        }

        /* SVG Lines Layer */
        svg.connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 1px; /* Expanded by JS */
            height: 1px; /* Expanded by JS */
            overflow: visible;
            pointer-events: none;
            z-index: 1;
        }

        path.link {
            fill: none;
            stroke: var(--line-color);
            stroke-width: 2px;
            transition: stroke 0.3s, stroke-width 0.3s;
        }

        path.link.highlighted {
            stroke: var(--highlight-color);
            stroke-width: 3px;
            filter: drop-shadow(0 0 5px var(--highlight-color));
        }

        /* Nodes */
        .node {
            position: absolute;
            width: var(--node-width);
            height: var(--node-height);
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 2;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s, opacity 0.3s;
            cursor: pointer;
            border: 1px solid var(--card-border);
        }

        .node:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border-color: var(--primary-color);
            z-index: 10;
        }

        .node.dimmed {
            opacity: 0.2;
            filter: grayscale(100%);
        }

        .node-card-content {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 12px;
        }

        /* Avatar Style */
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .node-info {
            flex: 1;
            overflow: hidden;
        }

        .node-url {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .node-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-sub);
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 10px;
            background: #eef2ff;
            color: var(--primary-color);
            font-weight: 600;
        }

        .toggle-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #f3f4f6;
            color: #6b7280;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        .node.has-children .toggle-btn {
            display: flex;
        }
        
        .node:not(.has-children) .toggle-btn {
            display: none;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            pointer-events: none;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Instructions Overlay */
        .instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
            pointer-events: none;
        }

    </style>
</head>
<body>

    <header>
        <div class="brand">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #818cf8;">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
            <h1>Crawler<span style="font-weight: 300; opacity: 0.8;">Viz</span></h1>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-val" id="stat-pages">0</div>
                <div class="stat-lbl">Pages</div>
            </div>
            <div class="stat-item">
                <div class="stat-val" id="stat-links">0</div>
                <div class="stat-lbl">Links</div>
            </div>
            <div class="stat-item">
                <div class="stat-val" id="stat-depth">0</div>
                <div class="stat-lbl">Depth</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Find URL...">
            </div>
            <button onclick="app.resetView()">Reset View</button>
            <button onclick="app.expandAll()">Expand All</button>
            <button onclick="app.collapseAll()">Collapse All</button>
        </div>
    </header>

    <div id="viewport">
        <div id="world">
            <svg class="connections" id="svgLayer"></svg>
            <div id="nodeLayer"></div>
        </div>
        <div class="instructions">
            Drag to Pan • Scroll to Zoom • Click Node to Toggle
        </div>
    </div>

    <div id="toast">Message</div>

    <script>
        // --- Data ---
        const crawlData = {
            url: "https://example.com",
            links: [
                {
                    url: "https://example.com/about",
                    links: [
                        {
                            url: "https://example.com/about/team",
                            links: [
                                { url: "https://example.com/about/team/john", links: [] },
                                { url: "https://example.com/about/team/jane", links: [] },
                                { url: "https://example.com/about/team/careers", links: [] }
                            ]
                        },
                        {
                            url: "https://example.com/about/history",
                            links: [
                                { url: "https://example.com/about/history/2020", links: [] },
                                { url: "https://example.com/about/history/2021", links: [] }
                            ]
                        },
                        { url: "https://example.com/about/contact", links: [] }
                    ]
                },
                {
                    url: "https://example.com/products",
                    links: [
                        {
                            url: "https://example.com/products/software",
                            links: [
                                { url: "https://example.com/products/software/app1", links: [] },
                                { url: "https://example.com/products/software/app2", links: [] },
                                { url: "https://example.com/products/software/app3", links: [] }
                            ]
                        },
                        {
                            url: "https://example.com/products/hardware",
                            links: [
                                { url: "https://example.com/products/hardware/device1", links: [] },
                                { url: "https://example.com/products/hardware/device2", links: [] }
                            ]
                        },
                        { url: "https://example.com/products/pricing", links: [] }
                    ]
                },
                {
                    url: "https://example.com/blog",
                    links: [
                        {
                            url: "https://example.com/blog/2024",
                            links: [
                                { url: "https://example.com/blog/2024/january", links: [] },
                                { url: "https://example.com/blog/2024/february", links: [] },
                                { url: "https://example.com/blog/2024/march", links: [] }
                            ]
                        },
                        { url: "https://example.com/blog/categories", links: [] },
                        { url: "https://example.com/blog/authors", links: [] }
                    ]
                },
                {
                    url: "https://example.com/support",
                    links: [
                        { url: "https://example.com/support/faq", links: [] },
                        { url: "https://example.com/support/docs", links: [] },
                        { url: "https://example.com/support/contact", links: [] }
                    ]
                }
            ]
        };

        // --- Configuration ---
        const CONFIG = {
            nodeWidth: 220,
            nodeHeight: 80,
            verticalGap: 100,
            horizontalGap: 20
        };

        // --- Application Logic ---
        class CrawlerApp {
            constructor(data) {
                this.data = JSON.parse(JSON.stringify(data)); // Deep copy
                this.viewport = document.getElementById('viewport');
                this.world = document.getElementById('world');
                this.svgLayer = document.getElementById('svgLayer');
                this.nodeLayer = document.getElementById('nodeLayer');
                this.searchInput = document.getElementById('searchInput');
                
                // View state
                this.scale = 1;
                this.panning = false;
                this.pointX = 0;
                this.pointY = 0;
                this.startX = 0;
                this.startY = 0;
                
                // Tree layout state
                this.nodes = [];
                this.links = [];
                
                this.init();
            }

            init() {
                this.processData(this.data);
                this.updateStats();
                this.setupInteractions();
                this.centerView();
                this.render();
                
                // Listen to search
                this.searchInput.addEventListener('input', (e) => this.handleSearch(e.target.value));
            }

            // Add helper properties to data (id, collapsed state, x, y)
            processData(node, depth = 0, parentId = null) {
                node.id = Math.random().toString(36).substr(2, 9);
                node.depth = depth;
                node.collapsed = depth > 1; // Auto-collapse deeper levels for initial clean look
                node.parentId = parentId;
                node.x = 0;
                node.y = 0;
                
                this.nodes.push(node);

                if (node.links) {
                    node.links.forEach(child => {
                        this.links.push({ source: node.id, target: child.id });
                        this.processData(child, depth + 1, node.id);
                    });
                }
            }

            // --- Layout Engine (Tree Algorithm) ---
            calculateLayout() {
                // 1. Reset dimensions
                this.nodes.forEach(n => {
                    n.width = CONFIG.nodeWidth;
                    // If collapsed, children don't take space
                    if (n.collapsed) n._visibleChildren = [];
                    else n._visibleChildren = n.links || [];
                });

                // 2. Recursive function to assign X and Y
                // Post-order traversal to calculate width
                const calculateSubtreeWidth = (node) => {
                    if (node._visibleChildren.length === 0) {
                        node.subtreeWidth = CONFIG.nodeWidth + CONFIG.horizontalGap;
                        return;
                    }
                    
                    node.subtreeWidth = 0;
                    node._visibleChildren.forEach(child => {
                        calculateSubtreeWidth(child);
                        node.subtreeWidth += child.subtreeWidth;
                    });
                };

                // Pre-order traversal to assign positions
                const assignCoordinates = (node, x, y) => {
                    node.x = x + node.subtreeWidth / 2 - CONFIG.nodeWidth / 2;
                    node.y = y;

                    let currentX = x;
                    node._visibleChildren.forEach(child => {
                        assignCoordinates(child, currentX, y + CONFIG.nodeHeight + CONFIG.verticalGap);
                        currentX += child.subtreeWidth;
                    });
                };

                // Start calculation from root
                calculateSubtreeWidth(this.data);
                assignCoordinates(this.data, 0, 0);

                // Adjust to make sure everything is centered around 0,0 relative to world
                const rootCenter = this.data.x + CONFIG.nodeWidth / 2;
                this.nodes.forEach(n => {
                    n.x -= rootCenter;
                });
            }

            // --- Rendering ---
            render() {
                this.calculateLayout();
                this.nodeLayer.innerHTML = '';
                this.svgLayer.innerHTML = '';

                // Render Links
                this.links.forEach(link => {
                    const sourceNode = this.nodes.find(n => n.id === link.source);
                    const targetNode = this.nodes.find(n => n.id === link.target);

                    // Don't draw if target is hidden (parent collapsed)
                    if (sourceNode.collapsed) return;

                    const startX = sourceNode.x + CONFIG.nodeWidth / 2;
                    const startY = sourceNode.y + CONFIG.nodeHeight;
                    const endX = targetNode.x + CONFIG.nodeWidth / 2;
                    const endY = targetNode.y;

                    // Bezier Curve
                    const controlY1 = startY + CONFIG.verticalGap / 2;
                    const controlY2 = endY - CONFIG.verticalGap / 2;
                    
                    const pathData = `M ${startX} ${startY} C ${startX} ${controlY1}, ${endX} ${controlY2}, ${endX} ${endY}`;

                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", pathData);
                    path.setAttribute("class", "link");
                    path.dataset.source = sourceNode.id;
                    path.dataset.target = targetNode.id;
                    this.svgLayer.appendChild(path);
                });

                // Render Nodes
                this.nodes.forEach(node => {
                    // Don't render if parent is collapsed
                    if (node.parentId) {
                        const parent = this.nodes.find(n => n.id === node.parentId);
                        if (parent && parent.collapsed) return;
                    }

                    const el = document.createElement('div');
                    el.className = `node ${node.links && node.links.length > 0 ? 'has-children' : ''}`;
                    if (node.collapsed) el.classList.add('collapsed');
                    el.style.transform = `translate(${node.x}px, ${node.y}px)`;
                    el.dataset.id = node.id;
                    el.dataset.url = node.url.toLowerCase();

                    // Get first letter for avatar
                    const domain = new URL(node.url).hostname;
                    const letter = domain.charAt(0).toUpperCase();
                    
                    // Random pastel color for avatar based on domain char code
                    const hue = domain.charCodeAt(0) * 13 % 360;
                    const avatarColor = `hsl(${hue}, 70%, 60%)`;

                    el.innerHTML = `
                        <div class="node-card-content">
                            <div class="avatar" style="background: ${avatarColor}">${letter}</div>
                            <div class="node-info">
                                <div class="node-url" title="${node.url}">${domain}</div>
                                <div class="node-meta">
                                    <span>Lvl ${node.depth}</span>
                                    <span class="status-badge">${node.links ? node.links.length : 0} Links</span>
                                </div>
                            </div>
                            <div class="toggle-btn">
                                ${node.collapsed ? '+' : '-'}
                            </div>
                        </div>
                    `;

                    // Click Interaction
                    el.onclick = (e) => {
                        e.stopPropagation(); // Prevent drag start
                        this.toggleNode(node);
                    };

                    this.nodeLayer.appendChild(el);
                });
                
                // Adjust SVG size
                const bounds = this.getWorldBounds();
                this.svgLayer.style.width = (bounds.width + 500) + 'px';
                this.svgLayer.style.height = (bounds.height + 500) + 'px';
                this.svgLayer.style.transform = `translate(${-bounds.x - 250}px, ${-bounds.y - 250}px)`;
            }

            toggleNode(node) {
                if (!node.links || node.links.length === 0) return;
                
                node.collapsed = !node.collapsed;
                this.render();
                this.handleSearch(this.searchInput.value); // Re-apply search if active
            }

            expandAll() {
                this.nodes.forEach(n => n.collapsed = false);
                this.render();
                this.handleSearch(this.searchInput.value);
                this.showToast("Expanded all nodes");
            }

            collapseAll() {
                this.nodes.forEach(n => {
                    if (n.depth > 0) n.collapsed = true;
                });
                this.render();
                this.showToast("Collapsed all nodes");
            }

            getWorldBounds() {
                if (this.nodes.length === 0) return { x:0, y:0, width:0, height:0 };
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                this.nodes.forEach(n => {
                    if (n.x < minX) minX = n.x;
                    if (n.y < minY) minY = n.y;
                    if (n.x + CONFIG.nodeWidth > maxX) maxX = n.x + CONFIG.nodeWidth;
                    if (n.y + CONFIG.nodeHeight > maxY) maxY = n.y + CONFIG.nodeHeight;
                });
                return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
            }

            // --- Interactions (Pan & Zoom) ---
            setupInteractions() {
                // Zoom
                this.viewport.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const xs = (e.clientX - this.pointX) / this.scale;
                    const ys = (e.clientY - this.pointY) / this.scale;
                    const delta = -e.deltaY;
                    
                    (delta > 0) ? (this.scale *= 1.1) : (this.scale /= 1.1);
                    
                    this.pointX = e.clientX - xs * this.scale;
                    this.pointY = e.clientY - ys * this.scale;
                    
                    this.updateTransform();
                }, { passive: false });

                // Pan
                this.viewport.addEventListener('mousedown', (e) => {
                    this.panning = true;
                    this.startX = e.clientX - this.pointX;
                    this.startY = e.clientY - this.pointY;
                    this.viewport.style.cursor = 'grabbing';
                });

                window.addEventListener('mousemove', (e) => {
                    if (!this.panning) return;
                    e.preventDefault();
                    this.pointX = e.clientX - this.startX;
                    this.pointY = e.clientY - this.startY;
                    this.updateTransform();
                });

                window.addEventListener('mouseup', () => {
                    this.panning = false;
                    this.viewport.style.cursor = 'grab';
                });
            }

            updateTransform() {
                this.world.style.transform = `translate(${this.pointX}px, ${this.pointY}px) scale(${this.scale})`;
            }

            centerView() {
                const vw = this.viewport.clientWidth;
                const vh = this.viewport.clientHeight;
                
                // Reset scale slightly
                this.scale = 1;
                // Center roughly
                this.pointX = vw / 2 - (this.data.x + CONFIG.nodeWidth/2); // Center Root
                this.pointY = 50; // Padding from top
                
                this.updateTransform();
            }
            
            resetView() {
                this.searchInput.value = '';
                this.handleSearch('');
                this.centerView();
                this.showToast("View Reset");
            }

            // --- Search ---
            handleSearch(term) {
                const cleanTerm = term.toLowerCase();
                const allNodes = document.querySelectorAll('.node');
                const allLinks = document.querySelectorAll('.link');

                // Reset visual states
                allNodes.forEach(n => {
                    n.classList.remove('dimmed');
                    n.querySelector('.node-url').innerHTML = n.dataset.url; // Reset text
                });
                allLinks.forEach(l => l.classList.remove('highlighted'));

                if (!cleanTerm) return;

                let matchFound = false;
                let firstMatchNode = null;

                this.nodes.forEach(node => {
                    // Check URL match
                    if (node.url.toLowerCase().includes(cleanTerm)) {
                        matchFound = true;
                        if (!firstMatchNode) firstMatchNode = node;

                        // Expand parents
                        let curr = node;
                        while(curr.parentId) {
                            const parent = this.nodes.find(n => n.id === curr.parentId);
                            if (parent) {
                                parent.collapsed = false;
                                // Highlight link to this child
                                const link = document.querySelector(`.link[data-source="${parent.id}"][data-target="${curr.id}"]`);
                                if (link) link.classList.add('highlighted');
                                curr = parent;
                            } else {
                                break;
                            }
                        }
                        
                        // Re-render might be needed if we expanded parents, but let's try visual only first for performance
                        // Actually, if we expanded parents, we MUST re-render to show the hidden nodes
                        // So we break, do logic, then render once.
                    }
                });

                if (matchFound) {
                    this.render(); // Render the newly expanded nodes
                    
                    // Now apply highlights to the DOM elements
                    const domNodes = Array.from(document.querySelectorAll('.node'));
                    domNodes.forEach(el => {
                        const url = el.dataset.url;
                        if (url.includes(cleanTerm)) {
                            // Highlight text
                            const urlEl = el.querySelector('.node-url');
                            const regex = new RegExp(`(${cleanTerm})`, 'gi');
                            urlEl.innerHTML = url.replace(regex, '<span style="background:var(--highlight-color); color:black; padding:0 2px;">$1</span>');
                        } else {
                            // Check if this node is an ancestor of a match or a match itself
                            // Simple heuristic: if it's not a match, dim it
                            // But we need to keep the path visible.
                            // A simpler approach for the visualizer: Dim everything that isn't a match or a parent of a match.
                            // For now, let's just dim non-matches.
                             // el.classList.add('dimmed'); 
                        }
                    });
                    
                    // Highlight lines again after re-render
                    this.nodes.forEach(node => {
                        if (node.url.toLowerCase().includes(cleanTerm)) {
                            let curr = node;
                            while(curr.parentId) {
                                const parent = this.nodes.find(n => n.id === curr.parentId);
                                if (parent) {
                                    const link = document.querySelector(`.link[data-source="${parent.id}"][data-target="${curr.id}"]`);
                                    if (link) {
                                        link.classList.add('highlighted');
                                        // Ensure parent is not dimmed
                                        const parentEl = document.querySelector(`.node[data-id="${parent.id}"]`);
                                        if(parentEl) parentEl.classList.remove('dimmed');
                                    }
                                    curr = parent;
                                } else break;
                            }
                            // Ensure match is not dimmed
                            const el = document.querySelector(`.node[data-id="${node.id}"]`);
                            if(el) el.classList.remove('dimmed');
                        }
                    });

                    // Dim all nodes that are not part of a highlighted path
                    const highlightedLinks = document.querySelectorAll('.link.highlighted');
                    const connectedNodeIds = new Set();
                    highlightedLinks.forEach(l => {
                        connectedNodeIds.add(l.dataset.source);
                        connectedNodeIds.add(l.dataset.target);
                    });

                    document.querySelectorAll('.node').forEach(n => {
                        if (!connectedNodeIds.has(n.dataset.id)) {
                            n.classList.add('dimmed');
                        }
                    });

                } else {
                     // No matches found - optional feedback
                }
            }

            // --- Stats ---
            updateStats() {
                const countPages = (n) => 1 + (n.links ? n.links.reduce((acc, c) => acc + countPages(c), 0) : 0);
                const countLinks = (n) => (n.links ? n.links.length + n.links.reduce((acc, c) => acc + countLinks(c), 0) : 0);
                const getDepth = (n, d) => !n.links || n.links.length === 0 ? d : Math.max(...n.links.map(c => getDepth(c, d+1)));

                document.getElementById('stat-pages').innerText = countPages(this.data);
                document.getElementById('stat-links').innerText = countLinks(this.data);
                document.getElementById('stat-depth').innerText = getDepth(this.data, 0);
            }

            showToast(msg) {
                const t = document.getElementById('toast');
                t.textContent = msg;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 2000);
            }
        }

        // Initialize App
        const app = new CrawlerApp(crawlData);

    </script>
</body>
