<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Crawler Map</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #ffffff;
            --line-color: #4b5563;
            --primary: #4f46e5;
            --text-main: #1f2937;
            --text-sub: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-color);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            background: rgba(0,0,0,0.5);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .title { font-size: 1.4rem; font-weight: bold; color: #818cf8; display: flex; align-items: center; gap: 10px; }
        
        .stats { display: flex; gap: 25px; }
        .stat-box { text-align: center; }
        .stat-num { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .stat-label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; }

        .controls { display: flex; gap: 10px; }
        
        input, button {
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
        }
        input { cursor: text; width: 200px; }
        button:hover, input:focus { background: rgba(255,255,255,0.2); border-color: var(--primary); }

        /* --- Infinite Canvas Area --- */
        #viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            cursor: grab;
        }
        #viewport:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            transform-origin: 0 0;
            /* Start centered */
            transform: translate(100px, 50%) scale(1); 
        }

        /* --- Vertical Tree CSS --- */
        /* Stack children vertically */
        .tree ul {
            display: flex;
            flex-direction: column;
            padding-left: 60px; /* Space for horizontal line */
            position: relative;
        }

        .tree li {
            position: relative;
            padding-top: 30px; /* Vertical gap between siblings */
            padding-left: 0;
        }

        /* The vertical line connecting siblings */
        .tree li::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 0;
            border-left: 2px solid var(--line-color);
            width: 2px;
        }

        /* The horizontal line from the vertical spine to the node */
        .tree li::after {
            content: '';
            position: absolute;
            top: 50%; left: 0;
            width: 60px;
            border-top: 2px solid var(--line-color);
        }

        /* Remove connectors for first/last to make it look like a tree branch */
        .tree li:first-child::before { top: 50%; height: 50%; }
        .tree li:last-child::before { bottom: 50%; height: 50%; }
        .tree li:only-child::before, .tree li:only-child::after { display: none; }
        
        /* Fix the horizontal line height for center alignment */
        .tree li::after { top: 35px; /* Half of approximate card height */ }
        .tree li::before { top: -15px; } /* Adjust to connect nicely */

        /* Root node adjustment */
        .tree > ul { padding-left: 0; }
        .tree > ul > li::before, .tree > ul > li::after { display: none; }

        /* --- Node Card Design --- */
        .node-card {
            width: 220px;
            background: var(--card-bg);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid transparent;
            position: relative;
            z-index: 10;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .node-card:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 15px rgba(0,0,0,0.4);
            border-color: var(--primary);
        }

        .node-card.highlight {
            border: 2px solid #ffd700;
            background: #fffbe6;
        }

        .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .info { flex: 1; overflow: hidden; }
        .domain { 
            font-weight: bold; 
            color: var(--text-main); 
            font-size: 0.9rem;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .meta { 
            font-size: 0.75rem; 
            color: var(--text-sub); 
            display: flex; 
            justify-content: space-between;
            margin-top: 4px;
        }

        /* Expand/Collapse Button */
        .toggler {
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px; height: 24px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        /* Hide Logic */
        .hidden { display: none !important; }

        /* Instructions */
        .overlay-ui {
            position: absolute;
            bottom: 20px; left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="title">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            Crawler Map
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-num" id="s-pages">0</div>
                <div class="stat-label">Pages</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="s-depth">0</div>
                <div class="stat-label">Depth</div>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search domain...">
            <button onclick="app.resetView()">Reset View</button>
            <button onclick="app.expandAll()">Expand</button>
            <button onclick="app.collapseAll()">Collapse</button>
        </div>
    </header>

    <div id="viewport">
        <div id="world">
            <div class="tree" id="treeRoot"></div>
        </div>
        <div class="overlay-ui">Drag to Move • Scroll to Zoom • Click to Expand</div>
    </div>

    <script>
        const data = {
            url: "https://example.com",
            links: [
                { url: "https://example.com/about", links: [
                    { url: "https://example.com/about/team", links: [] },
                    { url: "https://example.com/about/history", links: [] }
                ]},
                { url: "https://example.com/products", links: [
                    { url: "https://example.com/products/software", links: [] },
                    { url: "https://example.com/products/hardware", links: [] }
                ]},
                { url: "https://example.com/blog", links: [
                    { url: "https://example.com/blog/news", links: [] },
                    { url: "https://example.com/blog/archive", links: [] }
                ]}
            ]
        };

        // Add more data for testing depth
        data.links[0].links.push({ url: "https://example.com/about/contact", links: [] });
        data.links[1].links[0].links = [
            { url: "https://example.com/products/software/app1", links: [] },
            { url: "https://example.com/products/software/app2", links: [] }
        ];

        class App {
            constructor() {
                this.viewport = document.getElementById('viewport');
                this.world = document.getElementById('world');
                this.treeRoot = document.getElementById('treeRoot');
                
                // State
                this.scale = 1;
                this.panning = false;
                this.pointX = 100; // Start a bit to the right
                this.pointY = window.innerHeight / 2;
                this.startX = 0;
                this.startY = 0;

                this.init();
            }

            init() {
                this.updateStats(data);
                this.renderTree(data, this.treeRoot);
                this.setupInteractions();
                this.centerRoot();
            }

            getDomain(url) {
                try { return new URL(url).hostname; } catch { return url; }
            }

            getInitials(url) { return this.getDomain(url).charAt(0).toUpperCase(); }

            renderTree(nodeData, container) {
                const ul = document.createElement('ul');
                const li = document.createElement('li');
                
                // Create Card
                const hasChildren = nodeData.links && nodeData.links.length > 0;
                const card = document.createElement('div');
                card.className = 'node-card';
                card.dataset.url = nodeData.url;
                
                const color = `hsl(${this.getDomain(nodeData.url).length * 40}, 70%, 60%)`;

                card.innerHTML = `
                    <div class="avatar" style="background: ${color}">${this.getInitials(nodeData.url)}</div>
                    <div class="info">
                        <div class="domain" title="${nodeData.url}">${this.getDomain(nodeData.url)}</div>
                        <div class="meta">
                            <span>${hasChildren ? nodeData.links.length + ' items' : 'Leaf'}</span>
                        </div>
                    </div>
                    ${hasChildren ? '<div class="toggler">-</div>' : ''}
                `;

                // Toggle Logic
                card.onclick = (e) => {
                    e.stopPropagation(); // Stop drag
                    if (hasChildren) {
                        const childUl = li.querySelector('ul');
                        const tog = card.querySelector('.toggler');
                        if (childUl) {
                            if (childUl.classList.contains('hidden')) {
                                childUl.classList.remove('hidden');
                                tog.textContent = '-';
                            } else {
                                childUl.classList.add('hidden');
                                tog.textContent = '+';
                            }
                        }
                    }
                };

                li.appendChild(card);

                // Render Children
                if (hasChildren) {
                    const childrenUl = document.createElement('ul');
                    // Collapse deeper levels initially
                    if (nodeData.depth > 0) childrenUl.classList.add('hidden');

                    nodeData.links.forEach(child => {
                        child.depth = (nodeData.depth || 0) + 1;
                        this.renderTree(child, childrenUl);
                    });
                    li.appendChild(childrenUl);
                }

                ul.appendChild(li);
                container.appendChild(ul);
            }

            setupInteractions() {
                // Pan
                this.viewport.addEventListener('mousedown', (e) => {
                    this.panning = true;
                    this.startX = e.clientX - this.pointX;
                    this.startY = e.clientY - this.pointY;
                    this.viewport.style.cursor = 'grabbing';
                });

                window.addEventListener('mousemove', (e) => {
                    if (!this.panning) return;
                    e.preventDefault();
                    this.pointX = e.clientX - this.startX;
                    this.pointY = e.clientY - this.startY;
                    this.updateTransform();
                });

                window.addEventListener('mouseup', () => {
                    this.panning = false;
                    this.viewport.style.cursor = 'grab';
                });

                // Zoom
                this.viewport.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const xs = (e.clientX - this.pointX) / this.scale;
                    const ys = (e.clientY - this.pointY) / this.scale;
                    const delta = -e.deltaY;
                    
                    (delta > 0) ? (this.scale *= 1.1) : (this.scale /= 1.1);
                    
                    this.pointX = e.clientX - xs * this.scale;
                    this.pointY = e.clientY - ys * this.scale;
                    
                    this.updateTransform();
                }, { passive: false });
            }

            updateTransform() {
                this.world.style.transform = `translate(${this.pointX}px, ${this.pointY}px) scale(${this.scale})`;
            }

            centerRoot() {
                this.pointX = 50; 
                this.pointY = this.viewport.clientHeight / 2 - 50;
                this.scale = 1;
                this.updateTransform();
            }

            resetView() {
                this.centerRoot();
                document.getElementById('searchInput').value = '';
                this.clearHighlights();
                this.expandAll();
                this.collapseLevel(1); // Reset to level 1 open
            }

            expandAll() {
                document.querySelectorAll('ul').forEach(u => u.classList.remove('hidden'));
                document.querySelectorAll('.toggler').forEach(t => t.textContent = '-');
            }

            collapseAll() {
                // Keep root visible, hide everything else
                const allUls = Array.from(document.querySelectorAll('ul'));
                allUls.forEach((u, i) => {
                    if (i > 1) u.classList.add('hidden'); // index 0 is root wrapper, 1 is root's children
                });
                document.querySelectorAll('.toggler').forEach(t => t.textContent = '+');
            }

            collapseLevel(level) {
                // Custom helper to collapse everything below level X
                // Simple implementation: just collapse all deeper than 0
                const rootUl = this.treeRoot.querySelector('ul');
                if(rootUl) {
                    // Keep root's children visible
                    Array.from(rootUl.children).forEach(li => {
                        const subUl = li.querySelector('ul');
                        if(subUl) subUl.classList.add('hidden');
                        const tog = li.querySelector('.toggler');
                        if(tog) tog.textContent = '+';
                    });
                }
            }

            clearHighlights() {
                document.querySelectorAll('.node-card').forEach(c => c.classList.remove('highlight'));
            }

            search(term) {
                this.clearHighlights();
                term = term.toLowerCase();
                if(!term) return;

                document.querySelectorAll('.node-card').forEach(card => {
                    const url = card.dataset.url.toLowerCase();
                    if(url.includes(term)) {
                        card.classList.add('highlight');
                        
                        // Traverse up to expand parents
                        let parent = card.parentElement; // li
                        while(parent && parent.tagName === 'LI') {
                            const grandParentUl = parent.parentElement; // ul
                            if(grandParentUl) {
                                grandParentUl.classList.remove('hidden');
                                const grandParentLi = grandParentUl.parentElement; // li
                                if(grandParentLi) {
                                    const gpCard = grandParentLi.querySelector('.node-card');
                                    const gpTog = grandParentLi.querySelector('.toggler');
                                    if(gpCard) gpCard.classList.remove('highlight'); // Don't highlight parents path, just keep them visible
                                    if(gpTog) gpTog.textContent = '-';
                                }
                            }
                            parent = grandParentLi ? grandParentLi.parentElement : null;
                        }
                    }
                });
            }

            updateStats(node) {
                let count = 0;
                let depth = 0;
                const traverse = (n, d) => {
                    count++;
                    if(d > depth) depth = d;
                    if(n.links) n.links.forEach(c => traverse(c, d+1));
                }
                traverse(node, 0);
                document.getElementById('s-pages').innerText = count;
                document.getElementById('s-depth').innerText = depth;
            }
        }

        const app = new App();
        
        // Bind Search
        document.getElementById('searchInput').addEventListener('input', (e) => app.search(e.target.value));

    </script>
</body>
</html>
